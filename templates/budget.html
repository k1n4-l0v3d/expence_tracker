{% extends 'base.html' %}
{% block title %}Бюджет — {{ month }}/{{ year }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h4 class="mb-0 fw-bold"><i class="bi bi-piggy-bank-fill text-primary me-2"></i>Плановый бюджет</h4>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body">
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="d-flex gap-2 flex-wrap mb-4">
                <select name="month" class="form-select form-select-sm" style="width:140px">
                    {% for m_num, m_name in months %}
                        <option value="{{ m_num }}" {% if m_num == month %}selected{% endif %}>{{ m_name }}</option>
                    {% endfor %}
                </select>
                <input type="number" name="year" value="{{ year }}"
                       class="form-control form-control-sm" style="width:90px">
                <button class="btn grad-primary btn-sm" type="submit">
                    <i class="bi bi-save me-1"></i>Сохранить
                </button>
            </div>

            <p class="text-muted small mb-3">Укажи лимит расходов по каждой категории на выбранный месяц.
               Оставь поле пустым, чтобы убрать лимит.</p>

            <div class="row g-3">
                {% for cat in categories %}
                <div class="col-md-6">
                    <label class="form-label d-flex align-items-center gap-2">
                        <i class="bi {{ cat.icon }}" style="color:{{ cat.color }}"></i>
                        <span class="fw-semibold">{{ cat.name }}</span>
                    </label>
                    <div class="input-group">
                        <input type="number" name="budget_{{ cat.id }}" step="0.01" min="0"
                               class="form-control"
                               placeholder="без лимита"
                               value="{{ budget_map.get(cat.id, '') }}">
                        <span class="input-group-text">₽</span>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="mt-4">
                <button class="btn grad-primary pulse-btn" type="submit">
                    <i class="bi bi-save me-1"></i>Сохранить бюджет
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
