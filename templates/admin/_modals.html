{% if user.role != 'admin' %}
<!-- Modal: предупреждение -->
<div class="modal fade" id="warnModal{{ user.id }}" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form method="post" action="{{ url_for('admin_warn', user_id=user.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-exclamation-triangle text-warning me-2"></i>
                        Предупреждение для {{ user.username }}
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Причина / сообщение пользователю</label>
                    <textarea name="note" class="form-control" rows="3" placeholder="Необязательно"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-warning btn-sm">Выдать предупреждение</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal: бан -->
<div class="modal fade" id="banModal{{ user.id }}" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form method="post" action="{{ url_for('admin_ban', user_id=user.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-slash-circle text-danger me-2"></i>
                        Блокировка {{ user.username }}
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Причина блокировки</label>
                    <textarea name="reason" class="form-control" rows="3" placeholder="Необязательно"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-danger btn-sm">Заблокировать</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endif %}
