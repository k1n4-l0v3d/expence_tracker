{% extends 'base.html' %}
{% block title %}{% if expense %}Редактировать{% else %}Добавить{% endif %} расход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-body border-0 pt-3 fw-semibold">
                <i class="bi bi-{% if expense %}pencil{% else %}plus-circle{% endif %}-fill text-primary me-2"></i>
                {% if expense %}Редактировать расход{% else %}Добавить расход{% endif %}
            </div>
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="category_id">Категория <span class="text-danger">*</span></label>
                        <select name="category_id" id="category_id" class="form-select" required>
                            <option value="">— выберите —</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}"
                                    {% if expense and expense.category_id == cat.id %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="amount">Сумма, ₽ <span class="text-danger">*</span></label>
                        <input type="number" name="amount" id="amount" step="0.01" min="0.01" class="form-control"
                               value="{{ expense.amount|float if expense else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="expense_date">Дата <span class="text-danger">*</span></label>
                        <input type="date" name="expense_date" id="expense_date" class="form-control"
                               value="{{ expense.expense_date.strftime('%Y-%m-%d') if expense else today.strftime('%Y-%m-%d') }}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="description">Описание</label>
                        <input type="text" name="description" id="description" class="form-control" maxlength="255"
                               placeholder="Например: Пятёрочка, проездной..."
                               value="{{ expense.description or '' if expense else '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="notes">Заметка</label>
                        <textarea name="notes" id="notes" class="form-control" rows="2"
                                  placeholder="Дополнительно...">{{ expense.notes or '' if expense else '' }}</textarea>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" name="is_planned" id="is_planned"
                               {% if not expense or expense.is_planned %}checked{% endif %}>
                        <label class="form-check-label" for="is_planned">
                            Запланированный расход
                        </label>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn grad-primary pulse-btn">
                            <i class="bi bi-check-lg me-1"></i>
                            {% if expense %}Сохранить{% else %}Добавить{% endif %}
                        </button>
                        <a href="{{ url_for('expenses_list') }}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
